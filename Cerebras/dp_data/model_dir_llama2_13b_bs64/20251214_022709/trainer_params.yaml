trainer:
  init:
    model:
      name: llama
      vocab_size: 32000
      max_position_embeddings: 4096
      embd_pdrop: 0.0
      position_embedding_type: rotary
      hidden_size: 5120
      share_embedding_weights: false
      rotary_dim: 128
      num_hidden_layers: 40
      dropout_rate: 0.0
      norm_type: rmsnorm
      layer_norm_epsilon: 1.0e-05
      num_heads: 40
      attention_type: scaled_dot_product
      use_projection_bias_in_attention: false
      use_ffn_bias_in_attention: false
      attention_dropout_rate: 0.0
      filter_size: 13824
      nonlinearity: swiglu
      use_ffn_bias: false
      use_bias_in_output: false
      lr_adjustment_groups:
        embedding:
          param_filter_patterns: '*embedding*weight'
          scale: 1.0
        decoder_kernel:
          param_filter_patterns:
          - '*decoder*dense*weight'
          - '*decoder*linear*weight'
          - '*decoder*linear*expert_weights'
          scale: 1.0
        decoder_attention:
          param_filter_patterns: '*decoder*attn*dense*weight'
          scale: 1.0
        decoder_input_ffn:
          param_filter_patterns:
          - '*decoder*ffn.ffn.[!1]*weight'
          - '*decoder*ffn.ffn.[!1]*expert_weights'
          scale: 1.0
        decoder_output_ffn:
          param_filter_patterns:
          - '*decoder*ffn.ffn.[1]*weight'
          - '*decoder*ffn.ffn.[1]*expert_weights'
          scale: 1.0
      loss_scaling: num_tokens
      loss_weight: 1.0
    backend:
      backend_type: CSX
      cluster_config:
        job_labels:
        - name=llama2_13b
    model_dir: model_dir_llama2_13b_bs64
    optimizer:
      AdamW:
        betas:
        - 0.9
        - 0.95
        eps: 1.0e-05
        weight_decay: 0.1
        correct_bias: true
    schedulers:
    - SequentialLR:
        schedulers:
        - LinearLR:
            initial_learning_rate: 0.0
            end_learning_rate: 0.0003
            total_iters: 2000
        - CosineDecayLR:
            initial_learning_rate: 0.0003
            end_learning_rate: 3.0e-05
            total_iters: 474837
        milestones:
        - 2000
    precision:
      enabled: true
      fp16_type: cbfloat16
      loss_scaling_factor: dynamic
      max_gradient_norm: 1.0
    loop:
      max_steps: 476837
      eval_frequency: 10000
      eval_steps: 89
    checkpoint:
      steps: 10000
      save_initial_checkpoint: true
    logging:
      log_steps: 100
    callbacks:
    - CheckLoss: {}
    - LogOptimizerParamGroup:
        keys: lr
    - ComputeNorm: {}
    - ModelEvalMetrics: {}
    - RateProfiler: {}
    - DurationProfiler: {}
    - FlopUtilization: {}
    - SavePerformanceData: {}
    - DumpAvailableTensorNames: {}
    - ModelZooParamsMetadata: {}
    loggers:
    - ProgressLogger: {}
    - TensorBoardLogger: {}
    - TelemetryLogger: {}
    seed: 1
  fit:
    train_dataloader:
      data_dir: /software/datasets/llama_data_32K/test/
      batch_size: 64
      shuffle: false
      shuffle_seed: 1
      data_processor: GptHDF5MapDataProcessor
      num_workers: 8
      prefetch_factor: 10
      persistent_workers: true
